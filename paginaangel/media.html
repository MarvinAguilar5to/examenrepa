<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Cilindrada | S.A.S.A</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- NAVBAR BOOTSTRAP ADAPTATIVA --- */
        .navbar-custom {
            background-color: #000 !important;
            border-bottom: 2px solid #00d9ff;
            padding: 15px 0;
        }
        
        .navbar-custom .nav-link {
            color: #00d9ff !important;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 20px !important;
            transition: 0.3s;
        }
        
        .navbar-custom .nav-link:hover {
            background: #004a57;
            color: white !important;
        }

        /* Hamburguesa cyan */
        .navbar-custom .navbar-toggler {
            border-color: #00d9ff;
            margin-right: 15px;
        }
        .navbar-custom .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%2300d9ff' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
        }

        /* --- CONTENIDO --- */
        .titulo-seccion { 
            margin-top: 130px; 
            font-size: 3rem; 
            color: #00d9ff; 
            text-transform: uppercase; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitulo {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* --- GRID DE TARJETAS INDEPENDIENTES --- */
        .grid-motos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 40px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .card-moto { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 15px; 
            padding-bottom: 25px; 
            overflow: hidden; 
            transition: 0.4s; 
        }
        
        .card-moto:hover { 
            border-color: #00d9ff; 
            transform: translateY(-10px); 
        }
        
        .card-moto img { 
            width: 100%; 
            height: 380px; /* Ajustado para que resalten tus fotos verticales */
            object-fit: cover; 
        }
        
        .card-moto h3 { 
            margin: 20px 0 15px; 
            text-transform: uppercase; 
            font-size: 1.4rem; 
            color: white;
            letter-spacing: 1px;
        }
        
        .btn-ver { 
            display: inline-block; 
            padding: 10px 25px; 
            border: 2px solid #00d9ff; 
            color: #00d9ff; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            margin-top: 15px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .btn-ver:hover { 
            background: #00d9ff; 
            color: black; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html#inicio">Principal</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#especial">Destacado</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#compra">Compra</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="titulo-seccion">Media Cilindrada</h1>
    <p class="subtitulo">El equilibrio perfecto entre rendimiento diario y adrenalina</p>

    <div class="grid-motos">
        
        <div class="card-moto">
            <img src="img/honda.jpg" alt="Honda Media Cilindrada">
            <h3>Honda CBR 500R</h3>
            <a href="honda-media.html" class="btn-ver">Detalles</a>
        </div>

        <div class="card-moto">
            <img src="img/ninja.jpg" alt="Kawasaki Ninja">
            <h3>Kawasaki Ninja 400</h3>
            <a href="ninja-media.html" class="btn-ver">Detalles</a>
        </div>

        <div class="card-moto">
            <img src="img/Kawa.jpg" alt="Kawasaki Edition">
            <h3>Kawasaki ER-6f</h3>
            <a href="kawa-media.html" class="btn-ver">Detalles</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
