<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baja Cilindrada | S.A.S.A</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* ==========================================================================
           1. CONFIGURACIÓN GENERAL Y VARIABLES (ESTILO UNIFICADO)
           ========================================================================== */
        :root {
            --color-background: #0d0d0d;
            --color-neon-primary: #0ef10e; /* Verde neón */
            --color-neon-secondary: #00ffff; /* Cian neón */
            --color-text-light: #ffffff;
            --color-text-muted: #aaaaaa;
            --color-card-bg: #111111;
            --color-navbar-bg: rgba(17, 17, 17, 0.95);
            --font-main: Arial, sans-serif;
        }

        body { 
            margin: 0; 
            font-family: var(--font-main); 
            background-color: var(--color-background); 
            color: var(--color-text-light); 
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth;
            /* Textura fija de fondo aplicada */
            background-image: url('img/fondo.jpeg');
            background-repeat: repeat;
            background-attachment: fixed;
            background-position: center;
        }

        /* Capa oscura para legibilidad sobre el fondo texturizado */
        .content-overlay {
            background-color: rgba(0, 0, 0, 0.65);
            min-height: 100vh;
            width: 100%;
            padding-bottom: 60px;
        }

        /* ==========================================================================
           2. NAVBAR / ENCABEZADO CON BLUR Y LÍNEA VERDE
           ========================================================================== */
        .navbar-custom {
            background-color: var(--color-navbar-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--color-neon-primary);
            padding: 15px 0;
        }
        
        .navbar-custom .nav-link {
            color: var(--color-text-light) !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            padding: 8px 20px !important;
            transition: all 0.3s ease;
        }
        
        .navbar-custom .nav-link:hover {
            color: var(--color-neon-primary) !important;
            text-shadow: 0 0 8px var(--color-neon-primary);
            background: transparent !important;
        }

        /* Toggler de hamburguesa adaptado */
        .navbar-custom .navbar-toggler {
            border-color: var(--color-neon-primary);
            margin-right: 15px;
        }
        .navbar-custom .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%230ef10e' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
        }

        /* ==========================================================================
           3. TITULOS DE LA SECCIÓN
           ========================================================================== */
        .titulo-seccion { 
            margin-top: 140px; 
            font-size: 3rem; 
            color: var(--color-text-light); 
            text-transform: uppercase; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        .titulo-seccion span {
            color: var(--color-neon-primary);
            text-shadow: 0 0 15px var(--color-neon-primary);
        }

        .subtitulo {
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 50px;
            font-size: 1rem;
        }

        /* ==========================================================================
           4. GRID DE TARJETAS (EFECTO FLOTANTE Y BORDE NEÓN)
           ========================================================================== */
        .grid-motos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 35px; 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card-moto { 
            background-color: var(--color-card-bg) !important; 
            border-radius: 20px; 
            padding-bottom: 30px; 
            overflow: hidden; 
            transition: all 0.4s ease; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid transparent;
        }
        
        /* Efecto de iluminación al pasar el ratón */
        .card-moto:hover { 
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 255, 0, 0.25), 0 0 15px var(--color-neon-primary);
            border: 1px solid var(--color-neon-primary);
        }
        
        .card-moto img { 
            width: 100%; 
            height: 380px; 
            object-fit: cover; 
            filter: brightness(0.85);
            transition: all 0.4s ease;
        }

        .card-moto:hover img {
            filter: brightness(1);
        }
        
        .card-moto h3 { 
            margin: 25px 0 15px; 
            text-transform: uppercase; 
            font-size: 1.4rem; 
            color: var(--color-text-light);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .card-moto:hover h3 {
            color: var(--color-neon-primary);
            text-shadow: 0 0 10px var(--color-neon-primary);
        }
        
        /* Botón estilizado tipo neón */
        .btn-ver { 
            display: inline-block; 
            padding: 12px 35px; 
            background-color: var(--color-neon-primary);
            color: #000000 !important; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700; 
            margin-top: 10px;
            text-transform: uppercase;
            border: 2px solid var(--color-neon-primary);
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .btn-ver:hover { 
            background-color: transparent;
            color: var(--color-neon-primary) !important;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="content-overlay">

        <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
          <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html#inicio">Principal</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#especial">Destacado</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#compra">Compra</a></li>
              </ul>
            </div>
          </div>
        </nav>

        <h1 class="titulo-seccion">Baja <span>Cilindrada</span></h1>
        <p class="subtitulo">Eficiencia urbana, agilidad y estilo deportivo único</p>

        <div class="grid-motos">
            
            <div class="card-moto">
                <img src="img/YZF.jpg" alt="Yamaha YZF">
                <h3>Yamaha YZF-R125</h3>
                <a href="yzf-baja.html" class="btn-ver">Detalles</a>
            </div>

            <div class="card-moto">
                <img src="img/r1.jpg" alt="Yamaha R1 Replica">
                <h3>Yamaha R15 Sport</h3>
                <a href="r1-baja.html" class="btn-ver">Detalles</a>
            </div>

            <div class="card-moto">
                <img src="img/zontes.jpg" alt="Zontes Naked">
                <h3>Zontes U125</h3>
                <a href="zontes-baja.html" class="btn-ver">Detalles</a>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
