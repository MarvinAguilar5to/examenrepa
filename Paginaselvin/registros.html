<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda | Kick Zone</title>
    <style>
        /* 1. RESET Y FONDO ESTILIZADO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background: linear-gradient(#000c, #000c), url('fondo.png') center/cover fixed;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. NAVEGACIÓN (HEADER) */
        header {
            background: #000;
            position: fixed;
            inset: 0 0 auto; /* Posicionamiento rápido: arriba, izquierda y derecha */
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; }
        .logo span { color: #0ef10e; } /* Verde neón */

        .nav-menu { display: flex; list-style: none; gap: 25px; }
        .nav-menu a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* 3. FORMULARIO (CARD) */
        h1 { margin-top: 110px; text-transform: uppercase; }
        h1 span { color: #0ef10e; }

        .card {
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 420px;
            margin: 30px 0;
            border: 1px solid #333;
        }

        form { display: grid; gap: 15px; }
        label { color: #0ef10e; font-size: 0.8rem; font-weight: bold; text-align: left; }

        input, textarea {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
        }

        button {
            background: #0ef10e;
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .boton-volver { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; }

        /* 4. RESPONSIVE (CELULAR) */
        .menu-toggle { display: none; cursor: pointer; background: none; border: none; }
        .bar { width: 25px; height: 3px; background: #0ef10e; margin: 4px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-menu {
                position: absolute; top: 70px; left: -100%; width: 100%;
                background: #000; flex-direction: column; padding: 30px;
                transition: 0.4s; text-align: center;
            }
            .nav-menu.active { left: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KICK <span>ZONE</span></div>
        <nav>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">INICIO</a></li>
                <li><a href="productos.html">PRODUCTOS</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" id="mobile-menu">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </button>
    </header>

    <h1>Ayuda <span>Kick Zone</span></h1>

    <div class="card">
        <form action="https://formspree.io/f/mqewqqpj" method="POST">
            <label>Nombre Completo</label>
            <input type="text" name="name" required>

            <label>Correo Electrónico</label>
            <input type="email" name="email" required>

            <label>¿En qué podemos ayudarte?</label>
            <textarea name="message" rows="4" placeholder="Escribe código del producto y te enviaremos información" required></textarea>

            <button type="submit">Enviar Mensaje</button>
        </form>
        <a href="index.html" class="boton-volver">← Volver al inicio</a>
    </div>

    <script>
        const menuBtn = document.querySelector('#mobile-menu');
        const navMenu = document.querySelector('#nav-menu');

        // Función para abrir/cerrar menú en celular
        menuBtn.onclick = () => navMenu.classList.toggle('active');
    </script>

</body>
</html>
