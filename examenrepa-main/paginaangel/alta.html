<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Cilindrada | S.A.S.A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #000; color: white; text-align: center; }
        .navbar-custom { background-color: #000 !important; border-bottom: 2px solid #00d9ff; padding: 15px 0; }
        .navbar-custom .nav-link { color: #00d9ff !important; font-weight: bold; text-transform: uppercase; font-size: 14px; padding: 10px 20px !important; }
        .navbar-custom .navbar-toggler { border-color: #00d9ff; margin-right: 15px; }
        .navbar-custom .navbar-toggler-icon { background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%2300d9ff' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E"); }
        
        .titulo-seccion { margin-top: 130px; font-size: 3rem; color: #00d9ff; text-transform: uppercase; font-weight: bold; }
        .grid-motos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .card-moto { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding-bottom: 25px; overflow: hidden; transition: 0.4s; }
        .card-moto:hover { border-color: #00d9ff; transform: translateY(-10px); }
        .card-moto img { width: 100%; height: 240px; object-fit: cover; }
        .btn-ver { display: inline-block; padding: 10px 25px; border: 2px solid #00d9ff; color: #00d9ff; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        .btn-ver:hover { background: #00d9ff; color: black; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html#inicio">Principal</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#especial">Destacado</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#compra">Compra</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="titulo-seccion">Alta Cilindrada</h1>
    <div class="grid-motos">
        <div class="card-moto">
            <img src="img/CBR.jpg">
            <h3>Honda CBR</h3>
            <a href="cbr.html" class="btn-ver">DETALLES</a>
        </div>
        <div class="card-moto">
            <img src="img/GSX.jpg">
            <h3>Suzuki GSX</h3>
            <a href="gsx.html" class="btn-ver">DETALLES</a>
        </div>
        <div class="card-moto">
            <img src="img/h2r.jpg">
            <h3>Kawasaki H2R</h3>
            <a href="h2r.html" class="btn-ver">DETALLES</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
